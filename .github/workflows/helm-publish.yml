name: Package and publish Helm chart

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - run: helm lint charts/alerting-relay

      - run: helm package charts/alerting-relay

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - run: helm push alerting-relay-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
