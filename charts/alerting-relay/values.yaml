nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/next-gen-infrastructure/alerting-relay
  tag: latest
  pullPolicy: IfNotPresent

secret:
  create: false
  name: alerting-relay
  # content:
  #   DATABASE_URL: "postgres://user:pass@host:5432/alerting_relay"
  #   SLACK_BOT_TOKEN: "xoxb-..."
  #   WEBHOOK_TOKEN: "shared-bearer-secret"

configMap:
  create: false
  name: alerting-relay
  # content:
  #   SLACK_CHANNELS: '{"cluster-a":{"alerting":"#alerts","notifications":"#notify"}}'

serviceAccount:
  create: false
  name: ""
  annotations: {}
  # The relay never talks to the Kubernetes API.
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: ""
  host: ""
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
